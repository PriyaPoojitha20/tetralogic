<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loans & EMI</title>

<link rel="stylesheet" href="../css/style.css">

<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="../dashboard.html">SmartFin</a>

<div class="container mt-4">

<h2>Loan & EMI Calculator</h2>

<form class="mt-3">

<div class="mb-3">
<label>Loan Amount</label>
<input type="number" class="form-control">
</div>

<div class="mb-3">
<label>Interest Rate (%)</label>
<input type="number" class="form-control">
</div>

<div class="mb-3">
<label>Loan Tenure (months)</label>
<input type="number" class="form-control">
</div>

<button class="btn btn-primary">Calculate EMI</button>
<input id="loanAmount" type="number">

<input id="interestRate" type="number">

<input id="tenure" type="number">

<button onclick="calculateEMI()" class="btn btn-primary">
Calculate EMI
</button>
