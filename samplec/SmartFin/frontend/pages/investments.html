<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartFin – Investment Planner</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="../dashboard.html">💰 SmartFin</a>
  <div class="navbar-links">
    <a href="../dashboard.html">← Dashboard</a>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="page-wrap">
  <h2>📈 Investment Planner</h2>

  <div class="form-group">
    <label for="investType">Investment Type</label>
    <input type="text" id="investType" placeholder="e.g. Mutual Fund, PPF, ELSS">
  </div>

  <div class="form-group">
    <label for="investAmount">Investment Amount (₹)</label>
    <input type="number" id="investAmount" placeholder="e.g. 10000" min="0">
  </div>

  <div class="form-group">
    <label for="investYears">Duration (Years)</label>
    <input type="number" id="investYears" placeholder="e.g. 5" min="1">
  </div>

  <div class="form-group">
    <label for="investRate">Expected Annual Return (%)</label>
    <input type="number" id="investRate" placeholder="e.g. 12" min="0" max="50">
  </div>

  <div class="form-group">
    <label for="riskLevel">Risk Level</label>
    <select id="riskLevel">
      <option value="Low">Low (FD / PPF)</option>
      <option value="Medium">Medium (Mutual Funds)</option>
      <option value="High">High (Stocks / SIP)</option>
    </select>
  </div>

  <button class="btn btn-success btn-full" onclick="analyzeInvestment()">Analyze Investment</button>

  <div id="result" class="result-box"></div>

  <a href="../dashboard.html" class="btn btn-back btn-full">← Back to Dashboard</a>
</div>

<script src="../js/main.js"></script>
<script src="../js/investments.js"></script>
</body>
</html>
