<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartFin – Financial Health Score</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="../dashboard.html">💰 SmartFin</a>
  <div class="navbar-links">
    <a href="../dashboard.html">← Dashboard</a>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="page-wrap">
  <h2>❤️ Financial Health Score</h2>
  <p style="color:#666;font-size:14px;margin-bottom:22px;">
    Fill your financial data across all modules or enter manually below to generate your score.
    Values auto-load if you've used other modules.
  </p>

  <div class="form-group">
    <label for="hIncome">Monthly Income (₹)</label>
    <input type="number" id="hIncome" placeholder="e.g. 60000">
  </div>

  <div class="form-group">
    <label for="hExpense">Monthly Expenses (₹)</label>
    <input type="number" id="hExpense" placeholder="e.g. 30000">
  </div>

  <div class="form-group">
    <label for="hSavings">Monthly Savings (₹)</label>
    <input type="number" id="hSavings" placeholder="e.g. 15000">
  </div>

  <div class="form-group">
    <label for="hInvestment">Monthly Investment (₹)</label>
    <input type="number" id="hInvestment" placeholder="e.g. 10000">
  </div>

  <div class="form-group">
    <label for="hLoan">Total Loan Amount (₹)</label>
    <input type="number" id="hLoan" placeholder="e.g. 500000">
  </div>

  <div class="form-group">
    <label for="hInsurance">Total Insurance Coverage (₹)</label>
    <input type="number" id="hInsurance" placeholder="e.g. 2000000">
  </div>

  <!-- Score Display -->
  <div class="score-wrap">
    <div class="score-circle" id="scoreCircle">
      <span id="scoreValue">—</span>
    </div>
  </div>
  <p id="scoreStatus"></p>
  <p id="scoreSuggestion"></p>

  <button class="btn btn-health btn-full" style="margin-top:24px;" onclick="generateScore()">Generate Health Score</button>

  <div id="result" class="result-box"></div>

  <a href="../dashboard.html" class="btn btn-back btn-full">← Back to Dashboard</a>
</div>

<script src="../js/main.js"></script>
<script src="../js/healthScore.js"></script>
</body>
</html>
