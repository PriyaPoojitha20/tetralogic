<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartFin – Insurance</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="../dashboard.html">💰 SmartFin</a>
  <div class="navbar-links">
    <a href="../dashboard.html">← Dashboard</a>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="page-wrap">
  <h2>🛡️ Insurance Advisor</h2>

  <div class="form-group">
    <label for="policyType">Insurance Type</label>
    <input type="text" id="policyType" placeholder="e.g. Health, Life, Vehicle, Term">
  </div>

  <div class="form-group">
    <label for="premium">Annual Premium (₹)</label>
    <input type="number" id="premium" placeholder="e.g. 20000" min="0">
  </div>

  <div class="form-group">
    <label for="coverage">Coverage Amount (₹)</label>
    <input type="number" id="coverage" placeholder="e.g. 5000000" min="0">
  </div>

  <div class="form-group">
    <label for="members">Family Members Covered</label>
    <input type="number" id="members" placeholder="e.g. 4" min="1">
  </div>

  <button class="btn btn-success btn-full" onclick="analyzeInsurance()">Analyze Insurance</button>

  <div id="result" class="result-box"></div>

  <a href="../dashboard.html" class="btn btn-back btn-full">← Back to Dashboard</a>
</div>

<script src="../js/main.js"></script>
<script src="../js/insurance.js"></script>
</body>
</html>
