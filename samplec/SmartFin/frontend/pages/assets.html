<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartFin – Asset Tracker</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="../dashboard.html">💰 SmartFin</a>
  <div class="navbar-links">
    <a href="../dashboard.html">← Dashboard</a>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="page-wrap">
  <h2>🏛️ Asset Tracker</h2>

  <div class="form-group">
    <label for="assetType">Asset Type</label>
    <input type="text" id="assetType" placeholder="e.g. Gold, Property, Stocks, FD">
  </div>

  <div class="form-group">
    <label for="assetValue">Current Value (₹)</label>
    <input type="number" id="assetValue" placeholder="e.g. 500000" min="0">
  </div>

  <div class="form-group">
    <label for="assetDate">Purchase Date</label>
    <input type="date" id="assetDate">
  </div>

  <div class="form-group">
    <label for="assetNotes">Notes (optional)</label>
    <input type="text" id="assetNotes" placeholder="e.g. 10g gold in bank locker">
  </div>

  <button class="btn btn-success btn-full" onclick="addAsset()">Add Asset</button>

  <div id="result" class="result-box"></div>

  <a href="../dashboard.html" class="btn btn-back btn-full">← Back to Dashboard</a>
</div>

<script src="../js/main.js"></script>
<script src="../js/assets.js"></script>
</body>
</html>
