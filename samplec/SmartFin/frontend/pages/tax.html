<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartFin – Tax Calculator</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="../dashboard.html">💰 SmartFin</a>
  <div class="navbar-links">
    <a href="../dashboard.html">← Dashboard</a>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="page-wrap">
  <h2>🧾 Tax Calculator (FY 2024-25)</h2>

  <div class="form-group">
    <label for="annualSalary">Annual Salary (₹)</label>
    <input type="number" id="annualSalary" placeholder="e.g. 800000">
  </div>

  <div class="form-group">
    <label for="deduction80C">80C Investment (max ₹1,50,000)</label>
    <input type="number" id="deduction80C" placeholder="e.g. 150000">
  </div>

  <div class="form-group">
    <label for="insurancePremium">Insurance Premium 80D (max ₹25,000)</label>
    <input type="number" id="insurancePremium" placeholder="e.g. 25000">
  </div>

  <div class="form-group">
    <label for="homeLoanInterest">Home Loan Interest 24B (max ₹2,00,000)</label>
    <input type="number" id="homeLoanInterest" placeholder="e.g. 150000">
  </div>

  <button class="btn btn-warning btn-full" onclick="calculateTax()">Calculate Tax</button>

  <div id="result" class="result-box"></div>

  <a href="../dashboard.html" class="btn btn-back btn-full">← Back to Dashboard</a>
</div>

<script src="../js/main.js"></script>
<script src="../js/taxCalculator.js"></script>
</body>
</html>
